<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 240px; 
            height: 240px;
            overflow: hidden;
        }
        .circle {
            width: 240px;
            height: 240px;
            background-color: #6366f1; /* Indigo-500 matching the reference */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .letter {
            color: white;
            font-family: sf pro display, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 150px;
            font-weight: 800;
            line-height: 1;
            margin-top: -10px; /* Optical center adjustment */
        }
    </style>
</head>
<body>
    <div class="circle">
        <span class="letter">A</span>
    </div>
</body>
</html>
